name: "TerraWeek Day 6 CI Live Lifecycle Gate"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform_live_pipeline:
    name: "Scan, Bootstrap, Deploy, and Teardown"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Day-6

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Static Security Analysis Check
      - name: Run Trivy Security Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: true
          format: 'table'
          exit-code: '0' 
          scan-ref: 'Day-6'

      # 2. 🔐 SECURE AWS AUTHENTICATION STEP
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Setup HashiCorp Terraform CLI Context
      - name: Setup HashiCorp Terraform CLI Context
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0 

      # 4. Auto-Format Code Alignment (fmt)
      - name: Auto-Format Code Alignment (fmt)
        run: terraform fmt -recursive

      # 5. 🏗️ BOOTSTRAP REMOTE STATE STORAGE NATIVELY
      # Automatically creates the S3 backend bucket and DynamoDB locking table if they are missing
      - name: Bootstrap Remote Backend Infrastructure
        run: |
          if ! aws s3api head-bucket --bucket "tws-terraweek-state-bucket" 2>/dev/null; then
            echo "Creating remote state S3 bucket..."
            aws s3api create-bucket --bucket "tws-terraweek-state-bucket" --region us-east-1
            aws s3api put-bucket-versioning --bucket "tws-terraweek-state-bucket" --versioning-configuration Status=Enabled
          fi
          
          if ! aws dynamodb describe-table --table-name "tws-terraweek-lock-table" 2>/dev/null; then
            echo "Creating remote state DynamoDB lock table..."
            aws dynamodb create-table \
              --table-name "tws-terraweek-lock-table" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region us-east-1
            echo "Waiting for DynamoDB table to become active..."
            aws dynamodb wait table-exists --table-name "tws-terraweek-lock-table" --region us-east-1
          fi

      # 6. Initialize Configurations (init)
      # Now succeeds because the target bucket and lock infrastructure actively exist
      - name: Initialize Configurations (init)
        run: terraform init

      # 7. Select or Create Staging Workspace
      # Assures the workspace exists to prevent initialization history mismatches
      - name: Configure Workspace
        run: terraform workspace select staging || terraform workspace new staging

      # 8. Run Semantic Validation Check (validate)
      - name: Run Semantic Validation Check (validate)
        run: terraform validate

      # 9. Execute Native Testing Assertions (test)
      - name: Execute Native Terraform Assertions (test)
        run: terraform test

      # 10. 🚀 LIVE INFRASTRUCTURE CREATION (apply)
      - name: Terraform Apply (Create Infra)
        run: terraform apply --auto-approve

      # 11. 🧹 AUTOMATED RESOURCE TEARDOWN (destroy)
      # Using 'always()' ensures infrastructure is torn down even if tests or applications fail
      - name: Terraform Destroy (Clean Up Infra)
        if: always()
        run: terraform destroy --auto-approve
