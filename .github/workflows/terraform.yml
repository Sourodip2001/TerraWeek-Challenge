name: "TerraWeek Day 6 CI Quality Gate"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform_quality_pipeline:
    name: "Validate, Scan, and Plan Operations"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Day-6

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Task 3 & 5: Static Security Analysis gate using Trivy Configuration Scanner
      - name: Run Trivy Security Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: true
          format: 'table'
          exit-code: '0' 
          scan-ref: 'Day-6'

      # 🔐 SECURE AWS AUTHENTICATION STEP
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Setup HashiCorp Terraform CLI Context
      - name: Setup HashiCorp Terraform CLI Context
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0 

      # Check Formatting Alignment (fmt)
      - name: Check Formatting Alignment (fmt)
        run: terraform fmt -recursive

      # Initialize Configurations (init)
      - name: Initialize Configurations (init)
        run: terraform init

      # Run Semantic Validation Check (validate)
      - name: Run Semantic Validation Check (validate)
        run: terraform validate

      # Task 2: Running native testing evaluations
      - name: Execute Native Terraform Assertions (test)
        run: terraform test
